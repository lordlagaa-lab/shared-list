<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Campismo — Partilhada</title>
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #24243a;
      --border: #2e2e48;
      --text: #e8e8f0;
      --text2: #9999b0;
      --accent: #7c6ef0;
      --green: #4ade80;
      --red: #f87171;
      --orange: #fb923c;
      --blue: #60a5fa;
      --purple: #a78bfa;
      --teal: #2dd4bf;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    .container {
      max-width: 800px;
      width: 100%;
    }
    header {
      text-align: center;
      margin-bottom: 28px;
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      color: var(--text2);
      font-size: 14px;
      margin-top: 4px;
    }
    .people-bar {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .person-chip {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .person-chip.active {
      border-color: var(--accent);
      background: var(--surface2);
    }
    .person-chip .count {
      font-size: 11px;
      background: var(--surface2);
      padding: 1px 7px;
      border-radius: 10px;
      color: var(--text2);
    }
    .dot-andre { color: #4ade80; }
    .dot-pedro { color: #60a5fa; }
    .dot-fifi { color: #f87171; }
    .dot-davids { color: #fb923c; }
    .dot-unassigned { color: var(--text2); }

    .add-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .add-bar input {
      flex: 1;
      padding: 11px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .add-bar input:focus {
      border-color: var(--accent);
    }
    .add-bar input::placeholder {
      color: var(--text2);
    }
    .add-category-select {
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    .add-category-select:focus {
      border-color: var(--accent);
    }
    .btn {
      padding: 11px 18px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-sm {
      padding: 5px 11px;
      font-size: 11px;
      border-radius: 8px;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .filter-btn .f-count {
      font-size: 10px;
      opacity: 0.7;
      margin-left: 3px;
    }

    /* Category header */
    .category-header {
      padding: 20px 4px 8px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .category-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .category-header:first-child {
      padding-top: 0;
    }

    .item-list {
      display: flex;
      flex-direction: column;
    }
    .item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: all 0.15s;
      margin-bottom: 4px;
    }
    .item:hover {
      border-color: #3a3a5a;
    }
    .item.done {
      opacity: 0.45;
    }
    .item.done .item-name {
      text-decoration: line-through;
    }
    .item-checkbox {
      margin-top: 3px;
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .item-body {
      flex: 1;
      min-width: 0;
    }
    .item-name {
      font-size: 14px;
      font-weight: 500;
      word-break: break-word;
    }
    .item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .assign-select {
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      outline: none;
    }
    .assign-select:focus {
      border-color: var(--accent);
    }
    .item-comment {
      flex: 1;
      min-width: 100px;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 11px;
      outline: none;
      transition: all 0.2s;
    }
    .item-comment:focus {
      border-color: var(--accent);
      color: var(--text);
    }
    .item-comment::placeholder {
      color: #555;
    }
    .item-delete {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      padding: 3px;
      line-height: 1;
      border-radius: 6px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .item-delete:hover {
      color: var(--red);
      background: rgba(248, 113, 113, 0.1);
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text2);
    }
    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .action-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .stats {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text2);
    }

    @media (max-width: 600px) {
      .add-bar { flex-wrap: wrap; }
      .add-category-select { flex: 1; }
      .item-meta { flex-direction: column; align-items: stretch; }
      .item-comment { min-width: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏕️ Campismo — Lista Partilhada</h1>
      <p>Cada um leva o seu · André · Pedro · Fifi · Davids</p>
    </header>

    <div class="people-bar" id="peopleBar">
      <span class="person-chip active" data-filter="all">
        Todos <span class="count" id="countAll">0</span>
      </span>
      <span class="person-chip" data-filter="andre">
        <span class="dot-andre">●</span> André <span class="count" id="countAndre">0</span>
      </span>
      <span class="person-chip" data-filter="pedro">
        <span class="dot-pedro">●</span> Pedro <span class="count" id="countPedro">0</span>
      </span>
      <span class="person-chip" data-filter="fifi">
        <span class="dot-fifi">●</span> Fifi <span class="count" id="countFifi">0</span>
      </span>
      <span class="person-chip" data-filter="davids">
        <span class="dot-davids">●</span> Davids <span class="count" id="countDavids">0</span>
      </span>
      <span class="person-chip" data-filter="unassigned">
        <span class="dot-unassigned">○</span> Por atribuir <span class="count" id="countUnassigned">0</span>
      </span>
    </div>

    <div class="add-bar">
      <input type="text" id="itemInput" placeholder="Adicionar item..." autofocus>
      <select class="add-category-select" id="addCategory">
        <option value="">Sem categoria</option>
        <option value="Abrigo e Conforto">Abrigo e Conforto</option>
        <option value="Zona Comum">Zona Comum</option>
        <option value="Energia">Energia</option>
        <option value="Cozinha e Alimentação">Cozinha e Alimentação</option>
        <option value="Limpeza">Limpeza</option>
        <option value="Segurança e Saúde">Segurança e Saúde</option>
        <option value="Extras Úteis">Extras Úteis</option>
      </select>
      <button class="btn btn-primary" onclick="addItem()">+ Add</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-status="all">Tudo <span class="f-count" id="fAll">0</span></button>
      <button class="filter-btn" data-status="active">Por levar <span class="f-count" id="fActive">0</span></button>
      <button class="filter-btn" data-status="done">Já tem dono <span class="f-count" id="fDone">0</span></button>
    </div>

    <div class="item-list" id="itemList">
      <div class="empty-state" id="emptyState">
        <h3>✨ Lista vazia</h3>
        <p>Adiciona itens acima para começar</p>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn btn-ghost" onclick="resetList()">🔄 Repor lista original</button>
      <button class="btn btn-ghost" onclick="clearDone()">🗑 Limpar concluídos</button>
      <button class="btn btn-ghost" onclick="exportData()">📤 Exportar</button>
      <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">📥 Importar</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>

    <div class="stats" id="stats"></div>
  </div>

  <script>
    // ── Data ────────────────────────────────────────────────────────────
    const PEOPLE = [
      { id: 'andre',  name: 'André',  emoji: '🟢' },
      { id: 'pedro',  name: 'Pedro',  emoji: '🔵' },
      { id: 'fifi',   name: 'Fifi',   emoji: '🔴' },
      { id: 'davids', name: 'Davids', emoji: '🟠' },
    ];

    const CATEGORIES = [
      'Abrigo e Conforto',
      'Zona Comum',
      'Energia',
      'Cozinha e Alimentação',
      'Limpeza',
      'Segurança e Saúde',
      'Extras Úteis',
    ];

    const DEFAULT_ITEMS = [
      // ── Abrigo e Conforto ──
      { name: 'Tendas',                         category: 'Abrigo e Conforto' },
      { name: 'Lona para colocar debaixo das tendas', category: 'Abrigo e Conforto' },
      { name: 'Toldo / sombrinha para a área comum',  category: 'Abrigo e Conforto' },
      { name: 'Martelo para estacas',           category: 'Abrigo e Conforto' },
      { name: 'Estacas e cordas extra',         category: 'Abrigo e Conforto' },
      { name: 'Fita americana (duct tape)',     category: 'Abrigo e Conforto' },
      // ── Zona Comum ──
      { name: 'Mesa dobrável',                  category: 'Zona Comum' },
      { name: 'Cadeiras dobráveis',             category: 'Zona Comum' },
      { name: 'Tapete ou manta para convívio',  category: 'Zona Comum' },
      { name: 'Iluminação LED para o acampamento', category: 'Zona Comum' },
      // ── Energia ──
      { name: 'Powerbank de grande capacidade',  category: 'Energia' },
      // ── Cozinha e Alimentação ──
      { name: 'Geleira',                        category: 'Cozinha e Alimentação' },
      { name: 'Acumuladores de frio / gelo',    category: 'Cozinha e Alimentação' },
      { name: 'Abre-garrafas e saca-rolhas',    category: 'Cozinha e Alimentação' },
      { name: 'Faca de cozinha',                category: 'Cozinha e Alimentação' },
      { name: 'Tábua de corte',                 category: 'Cozinha e Alimentação' },
      { name: 'Copos reutilizáveis',            category: 'Cozinha e Alimentação' },
      { name: 'Pratos e talheres reutilizáveis', category: 'Cozinha e Alimentação' },
      { name: 'Papel de cozinha',               category: 'Cozinha e Alimentação' },
      { name: 'Detergente da loiça',            category: 'Cozinha e Alimentação' },
      { name: 'Esponja',                        category: 'Cozinha e Alimentação' },
      // ── Limpeza ──
      { name: 'Sacos do lixo',                  category: 'Limpeza' },
      { name: 'Toalhetes húmidos',              category: 'Limpeza' },
      { name: 'Álcool gel',                     category: 'Limpeza' },
      { name: 'Papel higiénico de reserva',     category: 'Limpeza' },
      // ── Segurança e Saúde ──
      { name: 'Kit de primeiros socorros',      category: 'Segurança e Saúde' },
      { name: 'Pensos rápidos',                 category: 'Segurança e Saúde' },
      { name: 'Desinfetante',                   category: 'Segurança e Saúde' },
      { name: 'Analgésicos básicos',            category: 'Segurança e Saúde' },
      { name: 'Repelente de insetos',           category: 'Segurança e Saúde' },
      { name: 'Protetor solar',                 category: 'Segurança e Saúde' },
      // ── Extras Úteis ──
      { name: 'Baralho de cartas / jogos',      category: 'Extras Úteis' },
      { name: 'Coluna Bluetooth',               category: 'Extras Úteis' },
      { name: 'Lanterna potente',               category: 'Extras Úteis' },
      { name: 'Bidão de água',                  category: 'Extras Úteis' },
      { name: 'Corda para estender toalhas ou roupa', category: 'Extras Úteis' },
    ];

    let items = [];
    let filterPerson = 'all';
    let filterStatus = 'all';
    let nextId = 1;

    // ── Persistence ──────────────────────────────────────────────────────
    const STORAGE_KEY = 'shared-list-data-camping';

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const data = JSON.parse(raw);
          items = data.items || [];
          nextId = data.nextId || 1;
          // If items exist but are empty, seed with defaults
          if (items.length === 0) {
            seedDefaults();
          }
        } else {
          seedDefaults();
        }
      } catch (e) {
        seedDefaults();
      }
    }

    function seedDefaults() {
      items = DEFAULT_ITEMS.map((d, i) => ({
        id: i + 1,
        name: d.name,
        category: d.category,
        assignee: '',
        comment: '',
        done: false,
      }));
      nextId = items.length + 1;
      saveData();
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, nextId }));
    }

    // ── Render ──────────────────────────────────────────────────────────
    function getFilteredItems() {
      return items.filter(item => {
        if (filterPerson !== 'all' && filterPerson === 'unassigned') {
          if (item.assignee) return false;
        } else if (filterPerson !== 'all') {
          if (item.assignee !== filterPerson) return false;
        }
        if (filterStatus === 'active' && item.done) return false;
        if (filterStatus === 'done' && !item.done) return false;
        return true;
      });
    }

    function render() {
      const list = document.getElementById('itemList');
      const filtered = getFilteredItems();

      // Counts
      const allCount = items.length;
      const countByPerson = {};
      let unassignedCount = 0;
      items.forEach(item => {
        if (item.assignee) {
          countByPerson[item.assignee] = (countByPerson[item.assignee] || 0) + 1;
        } else {
          unassignedCount++;
        }
      });
      document.getElementById('countAll').textContent = allCount;
      PEOPLE.forEach(p => {
        const key = 'count' + p.id.charAt(0).toUpperCase() + p.id.slice(1);
        const el = document.getElementById(key);
        if (el) el.textContent = countByPerson[p.id] || 0;
      });
      document.getElementById('countUnassigned').textContent = unassignedCount;

      const activeCount = items.filter(i => !i.done).length;
      const doneCount = items.filter(i => i.done).length;
      document.getElementById('fAll').textContent = allCount;
      document.getElementById('fActive').textContent = activeCount;
      document.getElementById('fDone').textContent = doneCount;

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <h3>${allCount === 0 ? '✨ Lista vazia' : '📭 Nada corresponde'}</h3>
            <p>${allCount === 0 ? 'Adiciona itens acima' : 'Tenta outros filtros'}</p>
          </div>
        `;
        document.getElementById('stats').textContent = '';
        return;
      }

      // Group by category for display
      const grouped = {};
      const catOrder = [];
      filtered.forEach(item => {
        const cat = item.category || '';
        if (!grouped[cat]) {
          grouped[cat] = [];
          catOrder.push(cat);
        }
        grouped[cat].push(item);
      });

      let html = '';
      catOrder.forEach(cat => {
        if (cat) {
          html += `<div class="category-header">${escapeHtml(cat)}</div>`;
        }
        grouped[cat].forEach(item => {
          const person = PEOPLE.find(p => p.id === item.assignee);
          const dotClass = person ? `dot-${person.id}` : 'dot-unassigned';
          html += `
            <div class="item ${item.done ? 'done' : ''}">
              <input type="checkbox" class="item-checkbox" ${item.done ? 'checked' : ''}
                     onchange="toggleDone(${item.id})">
              <div class="item-body">
                <div class="item-name">${escapeHtml(item.name)}</div>
                <div class="item-meta">
                  <select class="assign-select" onchange="assignPerson(${item.id}, this.value)">
                    <option value="">— Quem leva</option>
                    ${PEOPLE.map(p => `
                      <option value="${p.id}" ${item.assignee === p.id ? 'selected' : ''}>
                        ${p.name}
                      </option>
                    `).join('')}
                  </select>
                  <input type="text" class="item-comment" placeholder="Nota..."
                         value="${escapeHtml(item.comment || '')}"
                         onchange="setComment(${item.id}, this.value)">
                </div>
              </div>
              <button class="item-delete" onclick="deleteItem(${item.id})" title="Remover">✕</button>
            </div>
          `;
        });
      });
      list.innerHTML = html;

      const donePct = allCount > 0 ? Math.round(doneCount / allCount * 100) : 0;
      document.getElementById('stats').textContent =
        `${allCount} item${allCount !== 1 ? 's' : ''} · ${activeCount} por levar · ${doneCount} com dono (${donePct}%)`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    // ── Actions ─────────────────────────────────────────────────────────
    function addItem() {
      const input = document.getElementById('itemInput');
      const name = input.value.trim();
      if (!name) return;
      const cat = document.getElementById('addCategory').value;
      items.push({ id: nextId++, name, category: cat, assignee: '', comment: '', done: false });
      input.value = '';
      input.focus();
      saveData();
      render();
    }

    function toggleDone(id) {
      const item = items.find(i => i.id === id);
      if (item) {
        item.done = !item.done;
        saveData();
        render();
      }
    }

    function assignPerson(id, personId) {
      const item = items.find(i => i.id === id);
      if (item) {
        item.assignee = personId;
        item.done = personId ? true : false;
        saveData();
        render();
      }
    }

    function setComment(id, text) {
      const item = items.find(i => i.id === id);
      if (item) {
        item.comment = text.trim();
        saveData();
      }
    }

    function deleteItem(id) {
      if (!confirm('Remover este item?')) return;
      items = items.filter(i => i.id !== id);
      saveData();
      render();
    }

    function clearDone() {
      const hasDone = items.some(i => i.done);
      if (!hasDone) return;
      if (!confirm('Limpar todos os itens com dono?')) return;
      items = items.filter(i => !i.done);
      saveData();
      render();
    }

    function resetList() {
      if (!confirm('Repor a lista original? Isto vai apagar as atribuições atuais.')) return;
      localStorage.removeItem(STORAGE_KEY);
      seedDefaults();
      render();
    }

    // ── Export / Import ──────────────────────────────────────────────────
    function exportData() {
      const blob = new Blob([JSON.stringify({ items, nextId, exported: new Date().toISOString() }, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `campismo-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.items || !Array.isArray(data.items)) throw new Error('Invalid format');
          const existingIds = new Set(items.map(i => i.id));
          let added = 0;
          data.items.forEach(incoming => {
            if (!existingIds.has(incoming.id)) {
              items.push(incoming);
              existingIds.add(incoming.id);
              added++;
            }
          });
          const maxExisting = items.reduce((m, i) => Math.max(m, i.id || 0), 0);
          if (data.nextId > maxExisting) nextId = data.nextId;
          nextId = Math.max(nextId, maxExisting + 1);
          saveData();
          render();
          alert(added > 0 ? `✅ Importados ${added} novo(s) item(ns)` : 'ℹ️ Nenhum item novo para importar');
        } catch (err) {
          alert('❌ Ficheiro inválido');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // ── Event listeners ──────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      render();

      document.querySelectorAll('.person-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.person-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          filterPerson = chip.dataset.filter;
          render();
        });
      });

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          filterStatus = btn.dataset.status;
          render();
        });
      });

      document.getElementById('itemInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addItem();
      });
    });
  </script>
</body>
</html>
