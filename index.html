<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Being Gathering — Lista Partilhada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;700&family=Rubik+Spray+Paint&display=swap" rel="stylesheet">
  <style>
    :root {
      --sand:       #e4dac4;
      --sand-light: #f0e8d6;
      --forest:     #383c1d;
      --pine:       #2a514c;
      --earth:      #442d18;
      --gold:       #ffec9e;
      --cream:      #fffdf5;
      --tan:        #e4b992;
      --burgundy:   #4d2626;
      --text:       #2c2418;
      --text-muted: #7a6e5a;
      --border:     #d4c8b0;
      --surface:    rgba(255,253,245,0.6);
      --surface2:   rgba(255,253,245,0.85);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--sand);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(228,185,146,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(56,60,29,0.05) 0%, transparent 50%);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
    }
    .top-stripe {
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--forest), var(--pine), var(--earth), var(--burgundy), var(--forest));
    }
    .container { max-width: 1000px; width: 100%; padding: 0 20px; }

    /* Header */
    header {
      text-align: center;
      padding: 40px 0 28px;
      position: relative;
    }
    .header-logo {
      max-width: 380px;
      width: 100%;
      height: auto;
      margin-bottom: 8px;
    }
    .spray-text {
      font-family: 'Rubik Spray Paint', 'Caveat', cursive;
      font-size: 32px;
      color: #cc2222;
      text-shadow:
        2px 2px 0 rgba(200,30,30,0.15),
        -1px -1px 0 rgba(200,30,30,0.08),
        0 0 8px rgba(200,30,30,0.1);
      letter-spacing: 6px;
      margin-top: -8px;
      margin-bottom: 4px;
      transform: rotate(-1deg);
      opacity: 0.92;
      display: block;
    }
    header::after {
      content: '';
      display: block;
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, var(--forest), var(--gold));
      margin: 20px auto 0;
      border-radius: 2px;
    }
    .festival-badge {
      display: inline-block;
      border: 1px solid var(--pine);
      color: var(--pine);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 34px;
      font-weight: 700;
      color: var(--earth);
      line-height: 1.15;
    }
    header h1 .ampersand { font-style: italic; font-weight: 400; color: var(--pine); }
    header p {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 6px;
    }

    /* Add Bar */
    .add-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .add-bar input {
      flex: 1;
      padding: 11px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }
    .add-bar input:focus {
      border-color: var(--pine);
      box-shadow: 0 0 0 3px rgba(42,81,76,0.1);
    }
    .add-bar input::placeholder { color: var(--text-muted); font-style: italic; }
    .add-category-select {
      padding: 11px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
    }
    .add-category-select:focus { border-color: var(--pine); }
    .btn {
      padding: 11px 22px;
      border: none;
      border-radius: 14px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary {
      background: var(--pine);
      color: var(--cream);
    }
    .btn-primary:hover {
      background: var(--forest);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(42,81,76,0.25);
    }

    /* Category header */
    .category-header {
      padding: 22px 4px 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--pine);
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .category-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── TABLE LAYOUT ── */
    .item-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 4px;
    }

    /* Column widths */
    .col-item   { width: 26%; }
    .col-tick   { width: 7%; text-align: center; }
    .col-note   { width: 43%; }

    /* Header row */
    .table-head {
      display: flex;
      align-items: center;
      padding: 0 4px 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .table-head .col-item { padding-left: 4px; }
    .table-head .col-tick { text-align: center; }
    .table-head .col-note { text-align: right; padding-right: 32px; }

    /* Body rows */
    .table-row {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px 6px;
      margin-bottom: 3px;
      transition: all 0.15s;
      backdrop-filter: blur(6px);
    }
    .table-row:hover {
      border-color: var(--tan);
      background: var(--surface2);
    }
    .item-label {
      font-size: 13px;
      font-weight: 500;
      padding: 6px 8px;
      line-height: 1.3;
      word-break: break-word;
      color: var(--text);
    }

    .tick-cell {
      text-align: center;
      padding: 2px 0;
    }
    .tick-cell input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--pine);
      cursor: pointer;
      border-radius: 3px;
      transition: transform 0.1s;
    }
    .tick-cell input[type="checkbox"]:hover {
      transform: scale(1.15);
    }
    .tick-label {
      display: block;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.3px;
      margin-top: 1px;
      opacity: 0.7;
    }

    .note-cell {
      padding: 4px 4px 4px 0;
      flex: 1;
    }
    .note-cell input {
      width: 100%;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--cream);
      color: var(--text);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border 0.2s;
    }
    .note-cell input:focus {
      border-color: var(--pine);
    }
    .note-cell input::placeholder {
      color: #b0a898;
      font-style: italic;
    }

    .row-del {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.15s;
      opacity: 0.3;
      line-height: 1;
    }
    .row-del:hover {
      color: var(--burgundy);
      background: rgba(77,38,38,0.08);
      opacity: 1;
    }

    /* Empty */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }
    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
      color: var(--text);
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 400;
    }

    /* Action bar + stats */
    .action-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    .btn-ghost {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      font-size: 12px;
      padding: 9px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-ghost:hover {
      border-color: var(--pine);
      color: var(--pine);
    }

    .stats {
      text-align: center;
      margin: 20px 0 40px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Footer */
    footer {
      width: 100%;
      text-align: center;
      padding: 20px 20px 28px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }
    footer .logo-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 14px;
      font-style: italic;
      color: var(--earth);
    }
    footer .logo-text .ampersand { color: var(--pine); }

    /* Mobile */
    @media (max-width: 700px) {
      header h1 { font-size: 26px; }
      .add-bar { flex-wrap: wrap; }
      .add-category-select { flex: 1; }
      .container { padding: 0 12px; }
      .item-label { font-size: 12px; padding: 4px 6px; }
      .tick-cell input[type="checkbox"] { width: 16px; height: 16px; }
      .tick-label { font-size: 8px; }
      .note-cell input { font-size: 10px; padding: 4px 8px; }
      .col-item { width: 22%; }
      .col-tick { width: 8%; }
      .col-note { width: 42%; }
    }
  </style>
</head>
<body>
  <div class="top-stripe"></div>
  <div class="container">
    <header>
      <img src="being-logo.jpg" alt="Being Gathering" class="header-logo">
      <span class="spray-text">Da Ganancia</span>
      <div class="festival-badge">1–5 July 2026 · Boomland</div>
      <h1>Being <span class="ampersand">&amp;</span> Gathering<br>Lista Partilhada</h1>
      <p>Cada um leva o seu · André · Pedro · Fifi · Davids</p>
      <div id="syncStatus" style="margin-top:8px;font-size:11px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;gap:6px;">
        <span id="syncDot" style="width:8px;height:8px;border-radius:50%;background:#888;display:inline-block;"></span>
        <span id="syncText">A ligar...</span>
      </div>
    </header>

    <div class="add-bar">
      <input type="text" id="itemInput" placeholder="Adicionar item..." autofocus>
      <select class="add-category-select" id="addCategory">
        <option value="">Categoria</option>
        <option value="Especiais no Menu" selected>⭐ Especiais no Menu</option>
        <option value="Abrigo e Conforto">Abrigo e Conforto</option>
        <option value="Zona Comum">Zona Comum</option>
        <option value="Energia">Energia</option>
        <option value="Cozinha e Alimentação">Cozinha e Alimentação</option>
        <option value="Limpeza">Limpeza</option>
        <option value="Segurança e Saúde">Segurança e Saúde</option>
        <option value="Extras Úteis">Extras Úteis</option>
        <option value="Para Acrescentar">Para Acrescentar</option>
      </select>
      <button class="btn btn-primary" onclick="addItem()">+ Adicionar</button>
    </div>

    <div class="table-head">
      <span class="col-item">Item</span>
      <span class="col-tick">André</span>
      <span class="col-tick">Pedro</span>
      <span class="col-tick">Fifi</span>
      <span class="col-tick">Davids</span>
      <span class="col-note">Nota</span>
      <span style="width:28px"></span>
    </div>

    <div id="itemContainer"></div>

    <div class="action-bar">
      <button class="btn btn-ghost" onclick="resetList()">⟳ Repor</button>
      <button class="btn btn-ghost" onclick="exportData()">↗ Exportar</button>
      <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">↙ Importar</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>

    <div class="stats" id="stats"></div>
  </div>

  <footer>
    <div class="logo-text">Being <span class="ampersand">&amp;</span> Gathering</div>
    <div style="margin-top:4px;">1–5 July 2026 · Boomland · Idanha-a-Nova · Portugal</div>
  </footer>

  <script>
    const API = "https://being-list-api.fluence-hitlist.workers.dev";
    const PEOPLE = [
      { id: 'andre',  name: 'André',  short: 'An' },
      { id: 'pedro',  name: 'Pedro',  short: 'Pe' },
      { id: 'fifi',   name: 'Fifi',   short: 'Fi' },
      { id: 'davids', name: 'Davids', short: 'Da' },
    ];

    const DEFAULT_ITEMS = [
      { name: '⛺ Tendas',                          cat: 'Abrigo e Conforto' },
      { name: '🟦 Lona debaixo das tendas',         cat: 'Abrigo e Conforto' },
      { name: '☂️ Toldo / guarda-sol área comum',    cat: 'Abrigo e Conforto' },
      { name: '🔨 Martelo para estacas',            cat: 'Abrigo e Conforto' },
      { name: '🪢 Estacas e cordas extras',          cat: 'Abrigo e Conforto' },
      { name: '🎀 Fita americana (duct tape)',      cat: 'Abrigo e Conforto' },
      { name: '🪑 Mesa dobrável',                   cat: 'Zona Comum' },
      { name: '💺 Cadeiras dobráveis',              cat: 'Zona Comum' },
      { name: '🧶 Tapete ou manta de convívio',      cat: 'Zona Comum' },
      { name: '💡 Iluminação LED para acampamento',   cat: 'Zona Comum' },
      { name: '🔋 Powerbank de grande capacidade',   cat: 'Energia' },
      { name: '🧊 Caixa Térmica',                    cat: 'Cozinha e Alimentação' },
      { name: '❄️ Acumuladores de frio / gelo',     cat: 'Cozinha e Alimentação' },
      { name: '🍾 Abre-garrafas e saca-rolhas',     cat: 'Cozinha e Alimentação' },
      { name: '🔪 Faca de cozinha',                 cat: 'Cozinha e Alimentação' },
      { name: '🪵 Tábua de corte',                  cat: 'Cozinha e Alimentação' },
      { name: '🥤 Copos reutilizáveis',             cat: 'Cozinha e Alimentação' },
      { name: '🍽️ Pratos e talheres reutilizáveis', cat: 'Cozinha e Alimentação' },
      { name: '🧻 Papel de cozinha',                cat: 'Cozinha e Alimentação' },
      { name: '🧼 Detergente da loiça',             cat: 'Cozinha e Alimentação' },
      { name: '🧽 Esponja',                         cat: 'Cozinha e Alimentação' },
      { name: '🗑️ Sacos do lixo',                   cat: 'Limpeza' },
      { name: '🧴 Toalhetes húmidos',               cat: 'Limpeza' },
      { name: '🧴 Álcool gel',                      cat: 'Limpeza' },
      { name: '🧻 Papel higiénico reserva',         cat: 'Limpeza' },
      { name: '🩹 Kit de primeiros socorros',        cat: 'Segurança e Saúde' },
      { name: '🩹 Pensos rápidos',                  cat: 'Segurança e Saúde' },
      { name: '🧴 Desinfetante',                    cat: 'Segurança e Saúde' },
      { name: '💊 Analgésicos básicos',             cat: 'Segurança e Saúde' },
      { name: '🦟 Repelente de insectos',            cat: 'Segurança e Saúde' },
      { name: '☀️ Protetor solar',                  cat: 'Segurança e Saúde' },
      { name: '🃏 Baralho de cartas / jogos',       cat: 'Extras Úteis' },
      { name: '🔊 Coluna Bluetooth',                cat: 'Extras Úteis' },
      { name: '🔦 Lanterna potente',                cat: 'Extras Úteis' },
      { name: '🪣 Bidão de água',                   cat: 'Extras Úteis' },
      { name: '🧵 Corda para estender roupa',       cat: 'Extras Úteis' },
      { name: '➕ Extra  1', cat: 'Para Acrescentar' },
      { name: '➕ Extra  2', cat: 'Para Acrescentar' },
      { name: '➕ Extra  3', cat: 'Para Acrescentar' },
      { name: '➕ Extra  4', cat: 'Para Acrescentar' },
      { name: '➕ Extra  5', cat: 'Para Acrescentar' },
      { name: '➕ Extra  6', cat: 'Para Acrescentar' },
      { name: '➕ Extra  7', cat: 'Para Acrescentar' },
      { name: '➕ Extra  8', cat: 'Para Acrescentar' },
      { name: '➕ Extra  9', cat: 'Para Acrescentar' },
      { name: '➕ Extra 10', cat: 'Para Acrescentar' },
    ];

    let items = [];
    let nextId = 1;
    const KEY = 'being-list-data-v2';
    let saving = false;
    let pollTimer = null;

    // ── API Sync ──
    async function loadFromAPI() {
      try {
        const resp = await fetch(`${API}/api/items`);
        const data = await resp.json();
        if (data.items && data.items.length > 0) {
          items = data.items;
          nextId = data.nextId || (items.length + 1);
          localStorage.setItem(KEY, JSON.stringify({ items, nextId }));
          setSyncStatus('synced', 'Sincronizado ✓');
        } else {
          seed();
          pushToAPI();
        }
      } catch(e) {
        setSyncStatus('error', 'Erro de ligação');
        // Try localStorage fallback
        try {
          const raw = localStorage.getItem(KEY);
          if (raw) {
            const d = JSON.parse(raw);
            items = d.items || [];
            nextId = d.nextId || 1;
            if (!items.length) seed();
          } else { seed(); }
        } catch(e2) { seed(); }
      }
      render();
    }

    function seed() {
      items = DEFAULT_ITEMS.map((d, i) => ({
        id: i + 1,
        name: d.name,
        cat: d.cat,
        ticks: { andre: false, pedro: false, fifi: false, davids: false },
        note: '',
      }));
      nextId = items.length + 1;
    }

    async function pushToAPI() {
      if (saving) return;
      saving = true;
      try {
        await fetch(`${API}/api/items`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items, nextId })
        });
        setSyncStatus('synced', 'Sincronizado ✓');
      } catch(e) {
        setSyncStatus('error', 'Erro ao guardar');
      }
      saving = false;
    }

    function startPolling() {
      pollTimer = setInterval(async () => {
        try {
          const resp = await fetch(`${API}/api/items`);
          const data = await resp.json();
          if (!data.items) return;
          const remote = JSON.stringify(data.items.map(i => [i.id, i.ticks, i.note]));
          const local = JSON.stringify(items.map(i => [i.id, i.ticks, i.note]));
          if (remote !== local) {
            items = data.items;
            nextId = data.nextId || (items.length + 1);
            render();
            setSyncStatus('synced', 'Sincronizado ✓');
          }
        } catch(e) {
          // silent
        }
      }, 3000);
    }

    function setSyncStatus(state, msg) {
      const dot = document.getElementById('syncDot');
      const txt = document.getElementById('syncText');
      if (!dot || !txt) return;
      dot.style.background = state === 'synced' ? '#2a514c' : state === 'error' ? '#cc2222' : '#888';
      txt.textContent = msg;
    }

    function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }

    function render() {
      const con = document.getElementById('itemContainer');
      if (!items.length) {
        con.innerHTML = '<div class="empty-state"><h3>🌿 Lista vazia</h3><p>Adiciona itens acima</p></div>';
        document.getElementById('stats').textContent = '';
        return;
      }

      const order = ['Especiais no Menu','Abrigo e Conforto','Zona Comum','Energia','Cozinha e Alimentação','Limpeza','Segurança e Saúde','Extras Úteis','Para Acrescentar',''];
      const groups = {};
      order.forEach(c => groups[c] = []);
      items.forEach(it => { const c = it.cat || ''; if (!groups[c]) groups[c] = []; groups[c].push(it); });

      let html = '';
      order.forEach(cat => {
        const g = groups[cat] || [];
        if (!g.length) return;
        if (cat) html += `<div class="category-header">${cat === 'Especiais no Menu' ? '⭐ ' + esc(cat) : esc(cat)}</div>`;
        g.forEach(it => {
          html += `<div class="table-row" data-id="${it.id}">
            <span class="col-item item-label">${esc(it.name)}</span>
            ${PEOPLE.map(p => `
              <span class="col-tick tick-cell">
                <input type="checkbox" ${it.ticks[p.id] ? 'checked' : ''}
                       onchange="tick(${it.id},'${p.id}',this.checked)">
                <span class="tick-label">${p.short}</span>
              </span>
            `).join('')}
            <span class="col-note note-cell">
              <input type="text" placeholder="Nota..." value="${esc(it.note)}"
                     onchange="setNote(${it.id},this.value)">
            </span>
            <button class="row-del" onclick="del(${it.id})">✕</button>
          </div>`;
        });
      });
      con.innerHTML = html;

      const total = items.length;
      const tickCounts = {};
      let tickedAny = 0;
      PEOPLE.forEach(p => tickCounts[p.id] = 0);
      items.forEach(it => {
        let has = false;
        PEOPLE.forEach(p => { if (it.ticks[p.id]) { tickCounts[p.id]++; has = true; } });
        if (has) tickedAny++;
      });
      const parts = PEOPLE.map(p => `${p.name}: ${tickCounts[p.id]}`);
      document.getElementById('stats').textContent =
        `${total} itens · ${tickedAny} com dono · ${parts.join(' · ')}`;
    }

    // ── Actions ──
    async function tick(id, person, val) {
      const it = items.find(i => i.id === id);
      if (it) { it.ticks[person] = val; render(); await pushToAPI(); }
    }

    async function setNote(id, val) {
      const it = items.find(i => i.id === id);
      if (it) { it.note = val.trim(); await pushToAPI(); }
    }

    async function addItem() {
      const inp = document.getElementById('itemInput');
      const name = inp.value.trim();
      if (!name) return;
      let cat = document.getElementById('addCategory').value;
      if (!cat) cat = 'Especiais no Menu';
      items.push({ id: nextId++, name, cat, ticks: { andre: false, pedro: false, fifi: false, davids: false }, note: '' });
      inp.value = '';
      inp.focus();
      render();
      await pushToAPI();
    }

    async function del(id) {
      if (!confirm('Remover este item?')) return;
      items = items.filter(i => i.id !== id);
      render();
      await pushToAPI();
    }

    async function resetList() {
      if (!confirm('Repor lista original?')) return;
      seed();
      render();
      await pushToAPI();
    }

    function exportData() {
      const blob = new Blob([JSON.stringify({ items, nextId, exported: new Date().toISOString() }, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `being-list-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.items || !Array.isArray(data.items)) throw new Error('bad');
          const existing = new Set(items.map(i => i.id));
          let added = 0;
          data.items.forEach(incoming => {
            if (!existing.has(incoming.id)) {
              items.push(incoming);
              existing.add(incoming.id);
              added++;
            }
          });
          const mx = items.reduce((m, i) => Math.max(m, i.id || 0), 0);
          if (data.nextId > mx) nextId = data.nextId;
          nextId = Math.max(nextId, mx + 1);
          save();
          render();
          alert(added > 0 ? `✅ ${added} importado(s)` : 'ℹ️ Nada novo');
        } catch(err) { alert('❌ Ficheiro inválido'); }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Bypass browser cache on first load
      if (!window.location.search.includes('v=')) {
        const v = 'v=' + Math.floor(Date.now() / 60000);
        window.location.replace(window.location.pathname + '?' + v);
        return;
      }
      loadFromAPI();
      startPolling();
      document.getElementById('itemInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addItem();
      });
    });
  </script>
</body>
</html>
